{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 text-center">
            <div class="error-icon mb-4">
                <i class="bi bi-emoji-frown display-1 text-warning"></i>
            </div>
            <h1 class="display-4 mb-3">404</h1>
            <h3 class="text-muted mb-4">Page Not Found</h3>
            <p class="lead mb-4">The page you are looking for doesn't exist or has been moved.</p>
            <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">
                <i class="bi bi-house me-2"></i>Back to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
