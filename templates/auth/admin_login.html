{% extends "base.html" %}

{% block title %}Admin Login - CloudCuisine{% endblock %}

{% block content %}
<section class="auth-section py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-4 col-md-6">
                <div class="auth-card admin-auth">
                    <div class="auth-header text-center">
                        <div class="admin-icon-wrapper">
                            <i class="bi bi-shield-lock display-4 text-warning"></i>
                        </div>
                        <h3 class="mt-3">Admin Portal</h3>
                        <p class="text-muted">Secure access for administrators</p>
                    </div>

                    <form method="POST" action="{{ url_for('auth.admin_login') }}">
                        <div class="mb-3">
                            <label for="email" class="form-label">Admin Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                                <input type="email" class="form-control" id="email" name="email"
                                       placeholder="Enter admin email" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-key"></i></span>
                                <input type="password" class="form-control" id="password" name="password"
                                       placeholder="Enter admin password" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-warning w-100 mb-3">
                            <i class="bi bi-shield-check me-2"></i>Login as Admin
                        </button>
                    </form>

                    <hr class="my-4">

                    <div class="text-center">
                        <a href="{{ url_for('auth.login') }}" class="text-muted text-decoration-none">
                            <i class="bi bi-arrow-left me-1"></i>Back to Customer Login
                        </a>
                    </div>

                    <div class="demo-credentials mt-4 p-3 bg-light rounded">
                        <small class="text-muted">
                            <strong>Demo Credentials:</strong><br>
                            Email: admin@cloudcuisine.com<br>
                            Password: admin123
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
